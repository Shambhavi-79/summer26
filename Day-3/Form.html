<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <!-- <form action="form.js" method="post"> -->
    <form method="get">
    <label>Name: </label>
    <input placeholder="Enter your name">
    <br><br>

    <label>Password: </label>
    <input type = "password" placeholder="Enter your password">
    <br><br>

    <label>E-mail: </label>
    <input type = "email" placeholder="Enter your e-mail">
    <br><br>

    <label>Address: </label>
    <input placeholder="Enter your address">
    <br><br>

    <label>Gender: </label>
    <input type="radio" name="gender" value = "M">Male
    <input type="radio" name="gender" value="F">Female
    <br><br>

    <label>Academic Qualification: </label>
    <select> 
        <option>High School</option>
        <option>Intermediate</option>
        <option>Graduate</option>
        <option>Post Graduate</option>
    </select>
    <br><br>

    <label>Profile Picture: </label>
    <input type = "file" placeholder="Upload your image">
    <br><br>

    <label>Postal Address: </label>
    <textarea id="23" placeholder="Enter your postal address"></textarea>
    <br><br>

    <label>Declaration: </label>
    <input type="checkbox"> I hereby declare that all the information provided by me are correct.
    <br><br>

    <button>Submit</button>

    </form>
</body>
</html>
